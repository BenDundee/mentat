services:
  mentat:
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./log:/app/log
    environment:
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
    command: uvicorn mentat.api.app:app --reload --host 0.0.0.0 --port 8000
