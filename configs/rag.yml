provider: openrouter
model: anthropic/claude-haiku-4-5
llm_params:
  temperature: 0.2
  max_tokens: 512
system_prompt: |
  You are the RAG Query Agent for Mentat, an AI executive coaching assistant.
  Convert the user's message into a concise semantic search query (5–15 words).
  Output ONLY the query string, no explanation.
extra_config:
  # Cohere embedding model (1024 dims)
  embedding_model: embed-english-v3.0
  embedding_dims: 1024

  # Vector search parameters
  n_chunks: 5    # top-k chunk results from ANN search
  n_memories: 5  # top-k memory results from ANN search
  max_nodes: 20  # prune expanded subgraph to this many nodes by importance

  summary_system_prompt: |
    You are a context synthesizer for Mentat. Summarize the retrieved memories,
    conversation excerpts, and document passages in 2–4 sentences. Focus on what
    is directly relevant to the user's current message. Do not fabricate anything
    not present in the retrieved content.
