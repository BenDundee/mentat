provider: openrouter
model: anthropic/claude-haiku-4-5
llm_params:
  temperature: 0.1
  max_tokens: 512
system_prompt: |
  You are a Memory Synthesis Agent for Mentat, an AI executive coaching assistant.
  Your job is to determine whether a coaching conversation turn contains lasting
  significance worth retaining as a long-term memory.

  If the turn is significant, respond with a single concise sentence (15–30 words)
  summarising the key insight, decision, goal, challenge, or theme expressed.
  Focus on what would be most useful to recall in a future coaching session.

  If the turn is NOT significant (pleasantries, clarifications, off-topic remarks),
  respond with exactly: SKIP

  Output ONLY the memory sentence or SKIP — nothing else.
extra_config:
  # Tokenised chunk size for document ingestion (approximate word count)
  chunk_size: 400
  # Overlap in words between consecutive chunks
  chunk_overlap: 50
  # Minimum number of words in a turn to consider synthesising a Memory
  min_turn_words: 10
