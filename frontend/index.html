<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentat — Executive Coach</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">Mentat</span>
        <button id="new-chat-btn" class="btn-new-chat" title="New conversation">+</button>
      </div>
      <nav id="conversation-list" class="conversation-list"></nav>
    </aside>

    <!-- Main chat panel -->
    <main class="chat-panel">
      <header class="chat-header">
        <span id="chat-title">New Conversation</span>
      </header>

      <div id="messages" class="messages"></div>

      <form id="chat-form" class="chat-form">
        <input type="file" id="file-input" accept=".pdf,.txt,.docx" style="display:none" />
        <button type="button" id="attach-btn" class="btn-attach" title="Attach document">&#128206;</button>
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Message your coach… (Shift+Enter to send)"
          rows="1"
          autofocus
        ></textarea>
        <button type="submit" id="send-btn" class="btn-send" title="Send">
          &#9658;
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
